CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_DEVICE_NAME="Scanner Test"
CONFIG_BT_TESTING=y

# Enable privacy with frequent address refreshes
CONFIG_BT_SMP=y
CONFIG_BT_PRIVACY=y
CONFIG_BT_RPA_TIMEOUT=2

# Enable chained advertising data so the peer can advertise ~1000 bytes,
# producing a fragmented chain at the scanner.
CONFIG_BT_CTLR_ADVANCED_FEATURES=y
CONFIG_BT_CTLR_ADV_DATA_CHAIN=y
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=1100
CONFIG_BT_CTLR_ADV_DATA_BUF_MAX=8
CONFIG_BT_CTLR_SCAN_DATA_LEN_MAX=1100
CONFIG_BT_CTLR_RX_BUFFERS=9
CONFIG_BT_BUF_EVT_RX_COUNT=16
CONFIG_BT_EXT_SCAN_BUF_SIZE=1100
CONFIG_BT_BUF_EVT_DISCARDABLE_SIZE=255

# Log & debug options
CONFIG_LOG=y
CONFIG_LOG_RUNTIME_FILTERING=y
CONFIG_LOG_THREAD_ID_PREFIX=y

CONFIG_ASSERT=y
CONFIG_THREAD_NAME=y
CONFIG_LOG_THREAD_ID_PREFIX=y
CONFIG_ARCH_POSIX_TRAP_ON_FATAL=y
